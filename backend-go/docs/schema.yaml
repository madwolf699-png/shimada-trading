database:
  name: DB仕様書(app_db)
  version: 1.0

tables:
  - name: account_types_master
    comment: 口座種別マスタ
    columns:
      - name: id
        type: bigint
        pk: true
        not_null: true
        auto_increment: true
        comment: ID
      - name: name
        type: varchar(100)
        comment: 種別名
    seed_data:
      - id : 1
        name: '普通預金'
      - id : 2
        name: '当座預金'

  - name: billing_days_master
    comment: 請求日マスタ
    columns:
      - name: id
        type: bigint
        pk: true
        not_null: true
        auto_increment: true
        comment: ID
      - name: name
        type: varchar(100)
        not_null: true
        comment: 請求日名
      - name: day
        type: integer
        not_null: true
        comment: 請求日
    seed_data:
      - id : 1
        name: '31日'
        day: 31

  - name: billing_months_master
    comment: 請求月マスタ
    columns:
      - name: id
        type: bigint
        pk: true
        not_null: true
        auto_increment: true
        comment: ID
      - name: name
        type: varchar(100)
        not_null: true
        comment: 請求月
    seed_data:
      - id : 1
        name: '当月'

  - name: closing_dates_master
    comment: 締日マスタ
    columns:
      - name: id
        type: bigint
        pk: true
        not_null: true
        auto_increment: true
        comment: ID
      - name: name
        type: varchar(100)
        not_null: true
        comment: 締日名
      - name: day
        type: integer
        not_null: true
        comment: 締日
    seed_data:
      - id : 1
        name: '31日'
        day: 31

  - name: collaborations_master
    comment: 連携種別マスタ
    columns:
      - name: id
        type: bigint
        pk: true
        not_null: true
        auto_increment: true
