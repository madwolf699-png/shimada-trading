      - name: name
        type: varchar(100)
        not_null: true
        comment: 処理名
    seed_data:
      - id : 1
        name: '切上げ'
      - id : 2
        name: '四捨五入'
      - id : 3
        name: '切捨て'

  - name: shippings_master
    comment: 荷主マスタ
    columns:
      - name: id
        type: bigint
        pk: true
        not_null: true
        auto_increment: true
        comment: ID
      - name : code
        type: varchar(100)
        not_null: true
        comment: 荷主コード⇒何桁？★別マスタが必要？
      - name: name
        type: varchar(100)
        not_null: true
        comment: 荷主名

  - name: departments_master
    comment: 部門マスタ
    columns:
      - name: id
        type: bigint
        pk: true
        not_null: true
        auto_increment: true
        comment: ID
      - name: shipping_id
        type: bigint
        not_null: true
        comment: 荷主コード
        fk:
          table: shippings_master
          column: id
      - name: code
        type: varchar(100)
        not_null: true
        comment: 部門コード⇒何桁？★
      - name: name
        type: varchar(100)
        not_null: true
        comment: 部門名称
      - name: charge_name
        type: varchar(100)
        not_null: true
        comment: 責任者名
      - name: email
        type: varchar(100)
        not_null: true
        comment: メールアドレス
      - name: warehouse_code
        type: varchar(100)
        not_null: true
        comment: 倉庫コード
      - name: district
        type: varchar(100)
        not_null: true
        comment: 地区⇒マスタが必要？★
      - name: order_selection_category
        type: varchar(100)
        not_null: true
        comment: オーダー選択区分⇒マスタが必要？★
      - name: channels
        type: varchar(100)
        not_null: true
        comment: 取扱チャンネル⇒マスタが必要？★
      - name: expense_claims
        type: varchar(100)
        not_null: true
        comment: 経費請求⇒マスタが必要？★

  - name: approval_flows_master
    comment: 承認フローマスタ
    columns:
      - name: id
        type: bigint
        pk: true
        not_null: true
        auto_increment: true
        comment: ID
      - name: department_id
        type: bigint
        comment: 部門ID⇒部門マスターとのリレーション？★
        fk:
          table: departments_master
          column: id
      - name: name_1
        type: varchar(100)
        not_null: true
        comment: 承認者１
      - name: name_2
        type: varchar(100)
        not_null: true
        comment: 承認者２
      - name: name_3
        type: varchar(100)
        not_null: true
        comment: 承認者３
      - name: name_4
        type: varchar(100)
        not_null: true
        comment: 承認者４
      - name: name_5
        type: varchar(100)
        not_null: true
        comment: 承認者５
      - name: valid_flag
        type: boolean
        not_null: true
        default: true
        comment: 有効無効

  - name: billings_master
    comment: 請求マスタ⇒1-17-11の請求項目との連携は未★
    columns:
      - name: id
        type: bigint
        pk: true
        not_null: true
        auto_increment: true
        comment: ID
      - name: shipping_id
        type: bigint
        not_null: true
        comment: 荷主
        fk:
          table: shippings_master
          column: id
      - name: closing_date_id
        type: bigint
        not_null: true
        comment: 締日
        fk:
          table: closing_dates_master
          column: id
      - name: billing_date_kind
        type: bigint
        not_null: true
        comment: 請求月
        fk:
          table: billing_months_master
          column: id
      - name: billing_date_id
        type: bigint
        not_null: true
        comment: 請求日
        fk:
          table: billing_days_master
          column: id
      - name: billing_department_id
        type: bigint
        not_null: true
        comment: 請求先部門
        fk:
          table: departments_master
          column: id
      - name: transfer_financial_institution
        type: varchar(100)
        not_null: true
        comment: 振込先金融機関名称
      - name: account_type
        type: bigint
        not_null: true
        comment: 口座種別
        fk:
          table: account_types_master
          column: id
      - name: account_number
        type: varchar(30)
        not_null: true
        comment: 口座番号
      - name: account_name
        type: varchar(100)
        not_null: true
        comment: 口座名義

      - name: consumption_tax_show_id
        type: bigint
        not_null: true
        comment: 消費税
        fk:
          table: consumption_tax_shows_master
          column: id
      - name: rounding_id
        type: bigint
        not_null: true
        comment: 端数処理(円未満)
        fk:
          table: roundings_master
          column: id
      - name: fare_aggregation_id
        type: bigint
        not_null: true
        comment: 運賃集約
        fk:
          table: fare_aggregations_master
          column: id

  - name: consumption_tax_rates_master
    comment: 消費税率保守マスタ
    columns:
      - name: id
        type: bigint
        pk: true
        not_null: true
        auto_increment: true
        comment: ID
      - name: code
        type: varchar(100)
        not_null: true
        comment: コード⇒このコードはどこで使用される？★
      - name: tax_rate
        type: decimal(5,2)
        not_null: true
        comment: 税率
      - name: effective_start_date
        type: date
        not_null: true
        comment: 有効開始日
      - name: remarks
        type: varchar(100)
        not_null: false
        comment: 備考
    seed_data:
      - id: 1
        code: '01'
        tax_rate: 3.00
        effective_start_date: '1989-04-01' 
        remarks: 3%
      - id: 2
        code: '02'
        tax_rate: 5.00
        effective_start_date: '1907-04-01' 
        remarks: 5%
      - id: 3
        code: '03'
        tax_rate: 8.00
        effective_start_date: '2014-04-01' 
        remarks: 8%
      - id: 4
        code: '04'
        tax_rate: 10.00
        effective_start_date: '2019-10-01' 
        remarks: 10%

  - name: customers_master
    comment: 利用者マスタ
    columns:
      - name: id
