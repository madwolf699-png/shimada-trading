      - name: name
        type: varchar(100)
        not_null: true
        comment: 連携種別名
    seed_data:
      - id : 1
        name: 'JSON'

  - name: consumption_tax_shows_master
    comment: 消費税表示形式マスタ
    columns:
      - name: id
