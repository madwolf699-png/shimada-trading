      - name: address_1
        type: varchar(100)
        not_null: true
        comment: 住所１
      - name: address_2
        type: varchar(100)
        not_null: false
        comment: 住所２

  - name: delivery_companys_master
    comment: 配送業者マスタ
    columns:
      - name: id
