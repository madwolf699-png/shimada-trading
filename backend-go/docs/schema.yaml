        pk: true
        not_null: true
        auto_increment: true
        comment: ID
      - name: name
        type: varchar(100)
        comment: 表示形式名
    seed_data:
      - id : 1
        name: '内税'
      - id : 2
        name: '外税'

  - name: fare_aggregations_master
    comment: 運賃集約マスタ
    columns:
    - name: id
      type: bigint
      pk: true
      not_null: true
      auto_increment: true
      comment: ID
    - name: name
      type: varchar(100)
      not_null: true
      comment: 集約名
    seed_data:
      - id: 1
        name: '入庫出庫別'

  - name: kinds_master
    comment: 種別マスタ
    columns:
      - name: id
        type: bigint
        pk: true
        not_null: true
        auto_increment: true
        comment: ID
      - name: name
        type: varchar(100)
        not_null: true
        comment: 種別名
    seed_data:
      - id : 1
        name: '請求書'

  - name: locations_master
    comment: ロケーションマスタ
    columns:
      - name: id
        type: bigint
        pk: true
        not_null: true
        auto_increment: true
        comment: ID
      - name: code
        type: varchar(100)
        not_null: true
        comment: ロケーションコード⇒何桁？★
      - name: warehouse
        type: varchar(100)
        not_null: true
        comment: 倉庫

  - name: roundings_master
    comment: 端数処理マスタ
    columns:
      - name: id
        type: bigint
        pk: true
        not_null: true
        auto_increment: true
